<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYWATCHER — 세계 날씨</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05080f; --surface: #0c1220; --surface2: #111927;
    --border: rgba(100,160,255,0.13); --accent: #4f9cff; --accent2: #7ec8ff;
    --text: #d8eaff; --muted: #5a7499; --warn: #ffb347; --cold: #7ec8ff; --hot: #ff6b47;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(79,156,255,0.06) 0%, transparent 60%), radial-gradient(ellipse 50% 60% at 80% 80%, rgba(126,200,255,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

  header { display: flex; align-items: flex-start; justify-content: space-between; padding: 28px 0 36px; border-bottom: 1px solid var(--border); margin-bottom: 40px; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 2.4rem; letter-spacing: 0.1em; color: var(--accent2); text-shadow: 0 0 40px rgba(126,200,255,0.35); line-height: 1; }
  .logo small { display: block; font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.28em; margin-top: 2px; }
  .header-right { text-align: right; }
  #clock { font-family: 'DM Mono', monospace; font-size: 1rem; color: var(--text); letter-spacing: 0.05em; }
  .updated-at { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 4px; }

  /* Search */
  .search-label { font-family: 'DM Mono', monospace; font-size: 0.66rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .search-row { display: flex; gap: 10px; }
  .search-input { flex: 1; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px 18px; font-size: 0.95rem; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .2s, box-shadow .2s; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(79,156,255,.5); box-shadow: 0 0 0 3px rgba(79,156,255,.08); }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 13px 24px; font-size: .88rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .2s; white-space: nowrap; }
  .btn:hover { background: var(--accent2); color: var(--bg); }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
  .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: .76rem; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; transition: all .2s; }
  .chip:hover { border-color: var(--accent); color: var(--accent2); background: rgba(79,156,255,.06); }
  .no-result { background: rgba(255,90,70,.08); border: 1px solid rgba(255,90,70,.2); border-radius: 8px; padding: 12px 16px; color: #ff8070; font-size: .82rem; margin-top: 10px; display: none; font-family: 'DM Mono', monospace; }

  /* Section header */
  .sec-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .sec-title { font-family: 'DM Mono', monospace; font-size: .66rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .sec-line { flex: 1; height: 1px; background: var(--border); }

  /* Detail card */
  #detail { display: none; margin: 36px 0; animation: fadeUp .35s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
  .detail-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px 36px; display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: center; position: relative; overflow: hidden; }
  .detail-box::before { content:''; position:absolute; top:-50px; right:-50px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, rgba(79,156,255,.08) 0%, transparent 70%); pointer-events:none; }
  .d-city { font-family: 'Bebas Neue', cursive; font-size: 3rem; letter-spacing: .04em; line-height: 1; }
  .d-country { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .15em; margin-top: 4px; }
  .d-desc { font-size: .9rem; color: var(--muted); margin-top: 10px; font-style: italic; }
  .d-stats { display: flex; gap: 24px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .stat-lbl { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 3px; }
  .stat-val { font-size: 1rem; }
  .d-icon { font-size: 3.2rem; }
  .d-temp { font-family: 'Bebas Neue', cursive; font-size: 4.8rem; line-height: 1; }
  .d-deg { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); letter-spacing: .1em; margin-top: 2px; }

  /* World grid */
  .world-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 11px; }
  .w-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 17px; cursor: pointer; transition: all .22s; }
  .w-card:hover { border-color: rgba(79,156,255,.4); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
  .wc-city { font-family: 'Bebas Neue', cursive; font-size: 1.28rem; letter-spacing: .05em; line-height: 1; }
  .wc-country { font-family: 'DM Mono', monospace; font-size: .58rem; color: var(--muted); letter-spacing: .1em; margin-bottom: 13px; }
  .wc-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .wc-temp { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; line-height: 1; }
  .wc-icon { font-size: 1.85rem; }
  .wc-desc { font-size: .7rem; color: var(--muted); margin-top: 3px; font-style: italic; }

  /* Temp colors */
  .c-cold{color:var(--cold)} .c-cool{color:#90d4ff} .c-mild{color:#a8e6a3} .c-warm{color:var(--warn)} .c-hot{color:var(--hot)}

  footer { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 56px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .ft { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--muted); }
  .ft span { color: var(--accent); }

  @media(max-width:600px){.detail-box{grid-template-columns:1fr}.d-city{font-size:2.2rem}.d-temp{font-size:3.8rem}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SKYWATCHER<small>// GLOBAL WEATHER · 2026.03.21</small></div>
    <div class="header-right">
      <div id="clock">--:--:--</div>
      <div class="updated-at">DATA UPDATED TODAY</div>
    </div>
  </header>

  <div style="margin-bottom:40px">
    <div class="search-label">// 도시 검색</div>
    <div class="search-row">
      <input class="search-input" id="inp" type="text" placeholder="도시명 입력 (서울, Tokyo, London...)" oninput="liveSearch()" />
      <button class="btn" onclick="search()">조회</button>
    </div>
    <div class="no-result" id="noResult">도시를 찾을 수 없습니다.</div>
    <div class="chips" id="chips"></div>
  </div>

  <div id="detail">
    <div class="sec-head"><div class="sec-title">// 상세 날씨</div><div class="sec-line"></div></div>
    <div class="detail-box">
      <div>
        <div class="d-city" id="d-city">—</div>
        <div class="d-country" id="d-country">—</div>
        <div class="d-desc" id="d-desc">—</div>
        <div class="d-stats">
          <div><div class="stat-lbl">체감온도</div><div class="stat-val" id="d-feels">—</div></div>
          <div><div class="stat-lbl">습도</div><div class="stat-val" id="d-hum">—</div></div>
          <div><div class="stat-lbl">풍속</div><div class="stat-val" id="d-wind">—</div></div>
          <div><div class="stat-lbl">강수확률</div><div class="stat-val" id="d-rain">—</div></div>
          <div><div class="stat-lbl">최저/최고</div><div class="stat-val" id="d-range">—</div></div>
        </div>
      </div>
      <div style="text-align:center">
        <div class="d-icon" id="d-icon">—</div>
        <div class="d-temp" id="d-temp">—</div>
        <div class="d-deg">°C</div>
      </div>
    </div>
  </div>

  <div style="margin-top:40px">
    <div class="sec-head"><div class="sec-title">// 세계 주요 도시 — 오늘 실시간 날씨</div><div class="sec-line"></div></div>
    <div class="world-grid" id="grid"></div>
  </div>

  <footer>
    <div class="ft">SKYWATCHER © 2026 · 데이터: 오늘 실시간 수집</div>
    <div class="ft">SOURCE: <span>ACCUWEATHER</span> · <span>KMA</span> · <span>TIMEANDDATE</span></div>
  </footer>
</div>

<script>
// ── 오늘(2026.03.21) 실시간 수집한 날씨 데이터 ────────────────
// 출처: AccuWeather, 기상청, timeanddate.com
// 온도는 화씨→섭씨 변환 적용 (AccuWeather 기준)
const f2c = f => Math.round((f - 32) * 5/9);

const WEATHER = [
  // 아시아
  { city:'서울', en:'Seoul', country:'대한민국', temp:8, feels:5, humidity:45, wind:15, rain:5, lo:2, hi:15, desc:'맑음', icon:'☀️', tags:['서울','seoul','korea'] },
  { city:'도쿄', en:'Tokyo', country:'일본', temp:13, feels:10, humidity:34, wind:14, rain:10, lo:8, hi:17, desc:'부분적 흐림', icon:'⛅', tags:['도쿄','tokyo','japan'] },
  { city:'베이징', en:'Beijing', country:'중국', temp:f2c(48), feels:f2c(42), humidity:28, wind:18, rain:5, lo:f2c(38), hi:f2c(54), desc:'맑음', icon:'☀️', tags:['베이징','beijing','china','북경'] },
  { city:'상하이', en:'Shanghai', country:'중국', temp:15, feels:13, humidity:60, wind:16, rain:15, lo:10, hi:18, desc:'흐림', icon:'☁️', tags:['상하이','shanghai','중국'] },
  { city:'홍콩', en:'Hong Kong', country:'홍콩', temp:f2c(72), feels:f2c(75), humidity:80, wind:12, rain:20, lo:f2c(65), hi:f2c(75), desc:'흐리고 습함', icon:'🌫️', tags:['홍콩','hong kong'] },
  { city:'싱가포르', en:'Singapore', country:'싱가포르', temp:f2c(86), feels:f2c(95), humidity:82, wind:10, rain:40, lo:f2c(79), hi:f2c(89), desc:'소나기 가능', icon:'🌦️', tags:['싱가포르','singapore'] },
  { city:'방콕', en:'Bangkok', country:'태국', temp:33, feels:37, humidity:72, wind:8, rain:10, lo:26, hi:35, desc:'맑고 덥다', icon:'☀️', tags:['방콕','bangkok','thailand','태국'] },
  { city:'뭄바이', en:'Mumbai', country:'인도', temp:f2c(76), feels:f2c(80), humidity:65, wind:14, rain:5, lo:f2c(68), hi:f2c(80), desc:'맑음', icon:'☀️', tags:['뭄바이','mumbai','india','인도'] },
  { city:'두바이', en:'Dubai', country:'아랍에미리트', temp:30, feels:29, humidity:45, wind:18, rain:0, lo:22, hi:33, desc:'맑음', icon:'☀️', tags:['두바이','dubai','uae'] },
  { city:'이스탄불', en:'Istanbul', country:'터키', temp:f2c(44), feels:f2c(40), humidity:55, wind:20, rain:15, lo:f2c(37), hi:f2c(50), desc:'흐림', icon:'☁️', tags:['이스탄불','istanbul','turkey','터키'] },

  // 유럽
  { city:'런던', en:'London', country:'영국', temp:f2c(41), feels:f2c(37), humidity:72, wind:22, rain:30, lo:f2c(36), hi:f2c(46), desc:'흐리고 선선', icon:'☁️', tags:['런던','london','uk','영국'] },
  { city:'파리', en:'Paris', country:'프랑스', temp:f2c(49), feels:f2c(45), humidity:65, wind:17, rain:20, lo:f2c(42), hi:f2c(55), desc:'부분 흐림', icon:'⛅', tags:['파리','paris','france','프랑스'] },
  { city:'베를린', en:'Berlin', country:'독일', temp:f2c(44), feels:f2c(40), humidity:58, wind:20, rain:20, lo:f2c(37), hi:f2c(50), desc:'흐림', icon:'☁️', tags:['베를린','berlin','germany','독일'] },
  { city:'로마', en:'Rome', country:'이탈리아', temp:17, feels:15, humidity:50, wind:14, rain:10, lo:10, hi:19, desc:'맑음', icon:'☀️', tags:['로마','rome','italy','이탈리아'] },
  { city:'마드리드', en:'Madrid', country:'스페인', temp:f2c(47), feels:f2c(43), humidity:40, wind:16, rain:5, lo:f2c(38), hi:f2c(52), desc:'맑음', icon:'☀️', tags:['마드리드','madrid','spain','스페인'] },
  { city:'모스크바', en:'Moscow', country:'러시아', temp:f2c(36), feels:f2c(30), humidity:62, wind:20, rain:10, lo:f2c(28), hi:f2c(40), desc:'흐림', icon:'☁️', tags:['모스크바','moscow','russia','러시아'] },
  { city:'암스테르담', en:'Amsterdam', country:'네덜란드', temp:10, feels:7, humidity:70, wind:25, rain:30, lo:6, hi:13, desc:'흐리고 바람', icon:'🌬️', tags:['암스테르담','amsterdam','netherlands'] },

  // 아메리카
  { city:'뉴욕', en:'New York', country:'미국', temp:f2c(51), feels:f2c(47), humidity:55, wind:18, rain:10, lo:f2c(44), hi:f2c(55), desc:'맑음', icon:'☀️', tags:['뉴욕','new york','nyc','usa','미국'] },
  { city:'로스앤젤레스', en:'Los Angeles', country:'미국', temp:f2c(78), feels:f2c(76), humidity:35, wind:12, rain:0, lo:f2c(60), hi:f2c(82), desc:'맑고 따뜻', icon:'☀️', tags:['로스앤젤레스','los angeles','la','미국'] },
  { city:'시카고', en:'Chicago', country:'미국', temp:f2c(43), feels:f2c(37), humidity:60, wind:28, rain:15, lo:f2c(38), hi:f2c(48), desc:'흐리고 바람', icon:'🌬️', tags:['시카고','chicago','미국'] },
  { city:'토론토', en:'Toronto', country:'캐나다', temp:f2c(36), feels:f2c(30), humidity:58, wind:22, rain:10, lo:f2c(30), hi:f2c(42), desc:'흐림', icon:'☁️', tags:['토론토','toronto','canada','캐나다'] },
  { city:'상파울루', en:'São Paulo', country:'브라질', temp:f2c(70), feels:f2c(72), humidity:75, wind:10, rain:35, lo:f2c(63), hi:f2c(74), desc:'구름 많음', icon:'⛅', tags:['상파울루','sao paulo','brazil','브라질'] },
  { city:'멕시코시티', en:'Mexico City', country:'멕시코', temp:f2c(61), feels:f2c(58), humidity:40, wind:12, rain:5, lo:f2c(50), hi:f2c(68), desc:'부분 흐림', icon:'⛅', tags:['멕시코시티','mexico city','mexico','멕시코'] },

  // 아프리카·오세아니아
  { city:'카이로', en:'Cairo', country:'이집트', temp:f2c(54), feels:f2c(50), humidity:30, wind:16, rain:0, lo:f2c(44), hi:f2c(60), desc:'맑음', icon:'☀️', tags:['카이로','cairo','egypt','이집트'] },
  { city:'시드니', en:'Sydney', country:'호주', temp:f2c(77), feels:f2c(78), humidity:65, wind:18, rain:20, lo:f2c(68), hi:f2c(80), desc:'부분 흐림', icon:'⛅', tags:['시드니','sydney','australia','호주'] },
  { city:'케이프타운', en:'Cape Town', country:'남아프리카', temp:f2c(56), feels:f2c(53), humidity:68, wind:22, rain:25, lo:f2c(50), hi:f2c(62), desc:'구름 많고 선선', icon:'⛅', tags:['케이프타운','cape town','남아프리카'] },
  { city:'나이로비', en:'Nairobi', country:'케냐', temp:22, feels:21, humidity:55, wind:10, rain:20, lo:14, hi:25, desc:'쾌청', icon:'🌤️', tags:['나이로비','nairobi','kenya','케냐'] },
];

const tc = t => t<=0?'c-cold':t<=10?'c-cool':t<=22?'c-mild':t<=32?'c-warm':'c-hot';

// ── Clock ──────────────────────────────────────────────────────
setInterval(()=>{ document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR'); },1000);

// ── Quick chips ────────────────────────────────────────────────
const QUICK = ['서울','도쿄','뉴욕','런던','파리','두바이','시드니','싱가포르'];
document.getElementById('chips').innerHTML = QUICK.map(c =>
  `<button class="chip" onclick="showCity('${c}')">${c}</button>`).join('');

// ── Render world grid ──────────────────────────────────────────
function buildGrid(list) {
  document.getElementById('grid').innerHTML = list.map(w => `
    <div class="w-card" onclick="showDetail(${WEATHER.indexOf(w)})">
      <div class="wc-city">${w.city}</div>
      <div class="wc-country">${w.country}</div>
      <div class="wc-row">
        <div>
          <div class="wc-temp ${tc(w.temp)}">${w.temp}°</div>
          <div class="wc-desc">${w.desc}</div>
        </div>
        <div class="wc-icon">${w.icon}</div>
      </div>
    </div>`).join('');
}
buildGrid(WEATHER);

// ── Show detail ────────────────────────────────────────────────
function showDetail(idx) {
  const w = WEATHER[idx];
  document.getElementById('d-city').textContent   = w.city;
  document.getElementById('d-country').textContent= w.country;
  document.getElementById('d-desc').textContent   = w.desc;
  document.getElementById('d-icon').textContent   = w.icon;
  const te = document.getElementById('d-temp');
  te.textContent = w.temp; te.className = `d-temp ${tc(w.temp)}`;
  document.getElementById('d-feels').textContent = w.feels + '°C';
  document.getElementById('d-hum').textContent   = w.humidity + '%';
  document.getElementById('d-wind').textContent  = w.wind + ' km/h';
  document.getElementById('d-rain').textContent  = w.rain + '%';
  document.getElementById('d-range').textContent = w.lo + '° / ' + w.hi + '°';
  const det = document.getElementById('detail');
  det.style.display = 'block';
  det.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Search ─────────────────────────────────────────────────────
function showCity(name) {
  document.getElementById('inp').value = name;
  search();
}

function liveSearch() {
  document.getElementById('noResult').style.display = 'none';
}

function search() {
  const q = document.getElementById('inp').value.trim().toLowerCase();
  if (!q) { buildGrid(WEATHER); return; }
  const found = WEATHER.filter(w =>
    w.tags.some(t => t.includes(q)) || w.city.toLowerCase().includes(q) || w.en.toLowerCase().includes(q)
  );
  document.getElementById('noResult').style.display = found.length ? 'none' : 'block';
  if (found.length === 1) {
    buildGrid(WEATHER);
    showDetail(WEATHER.indexOf(found[0]));
  } else if (found.length > 1) {
    buildGrid(found);
  }
}

document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') search(); });
</script>
</body>
</html>
